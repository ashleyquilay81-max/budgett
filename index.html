<!DOCTYPE html>
<html>
<head>
    <title>Cut-off Budgeting System</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 20px;
        }
        .container {
            max-width: 650px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        input, select {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
        }
        button {
            padding: 10px;
            margin-top: 10px;
            width: 100%;
            background: #28a745;
            color: white;
            border: none;
            cursor: pointer;
        }
        .expense-row {
            display: flex;
            gap: 10px;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            background: #e9ecef;
        }
        .warning { color: red; font-weight: bold; }
        .good { color: green; font-weight: bold; }
    </style>

    <script>
        function addExpense() {
            let container = document.getElementById("expenses");
            let div = document.createElement("div");
            div.classList.add("expense-row");

            div.innerHTML = `
                <input type="text" placeholder="Expense Name">
                <input type="number" step="0.01" placeholder="Amount" oninput="calculateTotal()">
            `;

            container.appendChild(div);
        }

        function calculateTotal() {
            let inputs = document.querySelectorAll("#expenses input[type='number']");
            let total = 0;

            inputs.forEach(input => {
                total += parseFloat(input.value) || 0;
            });

            document.getElementById("liveTotal").innerText = total.toFixed(2);
        }

        function calculateBudget() {
            let salary = parseFloat(document.getElementById("salary").value) || 0;
            let cutoff = document.getElementById("cutoff").value;

            let names = document.querySelectorAll("#expenses input[type='text']");
            let amounts = document.querySelectorAll("#expenses input[type='number']");

            let expenses = [];
            let total = 0;

            for (let i = 0; i < names.length; i++) {
                let name = names[i].value;
                let amount = parseFloat(amounts[i].value) || 0;

                if (name && amount > 0) {
                    expenses.push({ name, amount });
                    total += amount;
                }
            }

            let balance = salary - total;

            let resultHTML = `
                <h3>Summary (${cutoff} Cut-off)</h3>
                <p><strong>Salary:</strong> ₱${salary.toFixed(2)}</p>
                <p><strong>Total Expenses:</strong> ₱${total.toFixed(2)}</p>
                <p><strong>Remaining Balance:</strong> ₱${balance.toFixed(2)}</p>
            `;

            if (balance < 0) {
                resultHTML += `<p class="warning">⚠️ Over Budget!</p>`;
            } else if (balance < salary * 0.2) {
                resultHTML += `<p class="warning">⚠️ Low Balance!</p>`;
            } else {
                resultHTML += `<p class="good">✅ Good Budget!</p>`;
            }

            resultHTML += "<h4>Breakdown:</h4><ul>";
            expenses.forEach(exp => {
                resultHTML += `<li>${exp.name} - ₱${exp.amount.toFixed(2)}</li>`;
            });
            resultHTML += "</ul>";

            document.getElementById("result").innerHTML = resultHTML;
        }
    </script>
</head>
<body>

<div class="container">
    <h2>💰 Cut-off Budgeting System</h2>

    <label>Cut-off:</label>
    <select id="cutoff">
        <option value="10">10th Cut-off</option>
        <option value="25">25th Cut-off</option>
    </select>

    <label>Salary:</label>
    <input type="number" id="salary">

    <h3>Expenses</h3>
    <div id="expenses">
        <div class="expense-row">
            <input type="text" placeholder="Expense Name">
            <input type="number" step="0.01" placeholder="Amount" oninput="calculateTotal()">
        </div>
    </div>

    <button onclick="addExpense()">+ Add Expense</button>

    <p>Total: ₱<span id="liveTotal">0.00</span></p>

    <button onclick="calculateBudget()">Calculate</button>

    <div id="result" class="result"></div>
</div>

</body>
</html>
